security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # Configuration LDAP pour l'authentification
        my_ldap:
            ldap:
                service: Symfony\Component\Ldap\Ldap
                base_dn: '%env(BASE_DN)%'
                search_dn: '%env(SEARCH_DN)%'
                search_password: '%env(SEARCH_PASSWORD)%'
                default_roles: ROLE_USER
                uid_key: sAMAccountName
                extra_fields: ['CN']

        custom_ldap:
            id: App\Security\CustomLdapUserProvider

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        api:
            pattern: ^/api
            stateless: true
            jwt: ~
            provider: custom_ldap
        main:
            lazy: true
            provider: custom_ldap
            form_login_ldap:
                login_path: app_home
                check_path: app_login
                service: Symfony\Component\Ldap\Ldap
                dn_string: 'SOTHO\{user_identifier}'
                default_target_path: app_main
            logout:
                path: app_logout
                target: app_home

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 1209600  # Durée de validité du cookie (2 semaines)
                path: /
                always_remember_me: true
                remember_me_parameter: '_remember_me'
                name: 'REMEMBERME'
            # activate different ways to authenticate
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used
    access_control:
        # PUBLIC_ACCESS
        - { path: ^/login$, roles: PUBLIC_ACCESS }
        - { path: ^/logout$, roles: PUBLIC_ACCESS }
        - { path: ^/api/login$, roles: PUBLIC_ACCESS }
        # IS_AUTHENTICATED_FULLY - API
        - { path: ^/api/, roles: IS_AUTHENTICATED_FULLY }
        # IS_AUTHENTICATED_FULLY - Web
        - { path: ^/$, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/stats/, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/lead, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/leads, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/relance/, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/script, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/scLript, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/t/departement, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/operation, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/interlocuteur, roles: IS_AUTHENTICATED_FULLY }
        # Fallback pour le reste
        - { path: ^/, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
